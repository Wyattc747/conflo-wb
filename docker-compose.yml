version: "3.8"

services:
  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./apps/web:/app
      - /app/node_modules

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: conflo
      POSTGRES_USER: conflo
      POSTGRES_PASSWORD: conflo
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
